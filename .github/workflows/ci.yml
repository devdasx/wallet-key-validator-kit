name: CI

on:
  push:
    branches: [main]
    tags: ["[0-9]*.[0-9]*.[0-9]*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: examples/run-examples.sh
      - run: npm pack --dry-run
